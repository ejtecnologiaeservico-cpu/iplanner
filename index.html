<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iRunner PLAN - Login</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <div class="login-container">
            <div class="login-box">
                <div class="logo-circle">
                    <img src="assets/logo.png" alt="iRunner Logo" style="width: 100%; height: 100%; object-fit: contain; border-radius: 50%;"/>
                </div>
                
                <h1 class="login-title">Acesso iRunner</h1>
                <p class="login-subtitle">Painel do Treinador e Atletas</p>
                
                <div id="alert-container"></div>
                
                <form id="login-form">
                    <div class="input-group">
                        <label>E-mail</label>
                        <input type="text" id="email" placeholder="Digite seu e-mail" required>
                    </div>
                    
                    <div class="input-group">
                        <label>Senha</label>
                        <input type="password" id="password" placeholder="Digite sua senha" required>
                    </div>
                    
                    <button type="submit" id="login-btn" class="neon-btn" style="width:100%;">
                        Entrar
                    </button>
                </form>
                
                <div style="margin-top:30px; text-align:center; color:#AAA; font-size:14px;">
                    <strong>Desenvolvido por: EJ TECNOLOGIA E SERVIÇOS</strong><br>
                    
                    >>>>>  Para acessar o sistema consulte o treinador.
                </div>
            </div>
        </div>
    </div>
    
    <!-- Firebase App (the core Firebase SDK) is always required and must be listed first -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <!-- Add Firebase products that you want to use -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="js/app.js"></script>
    <script>
        checkAuth();
        
        document.getElementById('login-form').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value.trim();
            const btn = document.getElementById('login-btn');
            
            btn.disabled = true;
            btn.innerHTML = '<span class="spinner" style="width:20px; height:20px; display:inline-block; vertical-align:middle; margin-right:8px;"></span>Entrando...';
            
            setTimeout(async () => {
                const result = await validateLogin(email, password);
                
                if (result.success && result.user) {
                    // Recarregar o usuário completo do banco (com senha)
                    const users = await getUsers();
                    const fullUser = users.find(u => u.id === result.user.id);
                    
                    if (fullUser) {
                        saveCurrentUser(fullUser);
                        
                        if (fullUser.role === 'admin') {
                            window.location.href = 'admin-dashboard.html';
                        } else {
                            window.location.href = 'athlete-dashboard.html';
                        }
                    } else {
                        showAlert('Erro interno. Tente novamente.', 'error');
                        btn.disabled = false;
                        btn.textContent = 'Entrar';
                    }
                } else {
                    showAlert(result.error || 'E-mail ou senha incorretos!', 'error');
                    btn.disabled = false;
                    btn.textContent = 'Entrar';
                }
            }, 800);
        });
    </script>
</body>
</html>
